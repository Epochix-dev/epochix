name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.12" # uv run ignores `uv python install` unless pinned
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
      - run: uv run --extra dev ruff check src tests
      - run: uv run --extra dev ruff format --check src tests

  typecheck:
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.12"
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
      - run: uv run --extra dev mypy --strict src/epochix

  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    env:
      # Without this, uv run resolves its own interpreter and the matrix
      # version is silently ignored.
      UV_PYTHON: ${{ matrix.python }}
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
      - run: uv python install ${{ matrix.python }}
      - run: uv run --extra dev pytest -q tests/unit tests/integration
        env:
          EPOCHIX_DB: ":memory:"

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm test

  test-vscode:
    # Launches a real VS Code host (@vscode/test-electron) and runs the
    # extension integration suite headless under a virtual X display.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: epochix-vscode/package-lock.json
      - run: cd epochix-vscode && npm ci
      - name: Run extension host integration tests
        run: xvfb-run -a npm test
        working-directory: epochix-vscode

  browser:
    # Renders the real dashboard in Chromium, Firefox and WebKit (Safari's
    # engine) against a live server. Catches engine-specific paint/layout bugs
    # that neither the Python suite nor vitest can see. Playwright's Firefox
    # cannot spawn on Windows dev boxes, so Linux CI is the only place all
    # three engines actually run — hence EPOCHIX_REQUIRE_ALL_BROWSERS, which
    # turns a failed launch into a failure instead of a skip.
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.12"
      EPOCHIX_REQUIRE_ALL_BROWSERS: "1"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci && npm run build
      - name: Vendor the bundle where the server serves it from
        run: |
          mkdir -p src/epochix/_frontend/dist
          cp -r frontend/dist/. src/epochix/_frontend/dist/
      - uses: astral-sh/setup-uv@v5
      - run: uv run --extra dev playwright install --with-deps chromium firefox webkit
      - name: Render on every engine
        run: |
          uv run --extra dev pytest tests/browser --junitxml=render.xml
          # pytest exits 0 when every test SKIPS, so the exit code alone can't
          # prove the engines ran. Count them. (Don't grep the summary line —
          # addopts already sets -q, so a second -q suppresses it entirely.)
          uv run python - <<'PY'
          import sys, xml.etree.ElementTree as ET

          root = ET.parse("render.xml").getroot()
          suite = root.find("testsuite") if root.tag == "testsuites" else root
          total = int(suite.get("tests", 0))
          skipped = int(suite.get("skipped", 0))
          bad = int(suite.get("failures", 0)) + int(suite.get("errors", 0))
          passed = total - skipped - bad
          print(f"engines rendered: {passed} (skipped={skipped}, failed={bad})")
          if passed != 3 or bad:
              sys.exit("::error::expected 3 passing engine renders (chromium, firefox, webkit)")
          PY

  integrations:
    # Drives the Lightning and HuggingFace StoryCallbacks with the REAL
    # frameworks. They were only ever duck-typed before, and three bugs shipped
    # behind that gap — including a Lightning callback that crashed fit() on
    # hook lookup, and an HF callback whose inverted MRO made every hook a
    # silent no-op. CPU-only torch keeps this job to a couple of minutes.
    #
    # Two rows, because 0.5.10 showed dependency floors rot silently:
    #   latest — what a new `pip install` resolves to today.
    #   floor  — the versions pyproject actually PROMISES. `epochix[lightning]`
    #            installs the LEGACY `pytorch-lightning` distribution, whose
    #            Callback is a different class object from `lightning`'s, so it
    #            exercises the other branch of _callback_base().
    strategy:
      fail-fast: false
      matrix:
        include:
          - deps: latest
            python: "3.12"
            pins: 'lightning "transformers>=4.40" "accelerate>=1.1.0"'
          - deps: floor
            python: "3.10"
            pins: '"pytorch-lightning==2.3.0" "transformers==4.40.0" "accelerate>=0.21"'
    name: integrations (${{ matrix.deps }})
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: ${{ matrix.python }}
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
      - name: Add the real frameworks to the project env (CPU-only torch)
        run: |
          uv sync --extra dev
          uv pip install torch --index-url https://download.pytorch.org/whl/cpu
          uv pip install ${{ matrix.pins }} numpy
          uv pip install tensorboard pandas
      - name: Real Lightning / HuggingFace training + real TensorBoard import
        run: |
          # --no-sync: a plain `uv run` would re-sync the env and drop the
          # frameworks we just installed, leaving the tests to skip.
          uv run --no-sync pytest -v --junitxml=integrations.xml \
            tests/integration/test_framework_callbacks.py \
            tests/integration/test_importers.py
          # These tests skip when a framework is missing, and an all-skipped run
          # still exits 0 — so demand that they actually executed.
          uv run --no-sync python - <<'PY'
          import sys, xml.etree.ElementTree as ET

          root = ET.parse("integrations.xml").getroot()
          suite = root.find("testsuite") if root.tag == "testsuites" else root
          total = int(suite.get("tests", 0))
          skipped = int(suite.get("skipped", 0))
          bad = int(suite.get("failures", 0)) + int(suite.get("errors", 0))
          passed = total - skipped - bad
          print(f"integration tests exercised: {passed} (skipped={skipped}, failed={bad})")
          if skipped or bad:
              sys.exit("::error::framework/importer tests must all run, none may skip")
          PY

  e2e:
    # Full-pipeline tests (7 demo logs → parser → story engine → store → API).
    # No browser involved — they drive the pipeline and TestClient directly.
    runs-on: ubuntu-latest
    needs: test
    env:
      UV_PYTHON: "3.12"
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
      - run: uv run --extra dev pytest tests/e2e -q

  # ── Lighthouse CI ──────────────────────────────────────────────────────────
  lighthouse:
    # Advisory quality gate: scores are worth reading, but a threshold miss
    # should not block merges. Flip to blocking once budgets are tuned
    # against a few real runs.
    runs-on: ubuntu-latest
    needs: test-frontend
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: .lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
