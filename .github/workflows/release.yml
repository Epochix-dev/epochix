name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  build-wheel:
    needs: build-frontend
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
      - uses: astral-sh/setup-uv@v5
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: dist/

  publish:
    needs: build-wheel
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  # ── SBOM — generate a CycloneDX software-bill-of-materials from the wheel ──
  sbom:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write   # attach to release
      packages: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-ubuntu-latest
          merge-multiple: true
          path: dist/
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: dist/
          format: cyclonedx-json
          artifact-name: sbom-${{ github.ref_name }}.cyclonedx.json
          output-file: sbom.cyclonedx.json
      - name: Attach SBOM to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: sbom.cyclonedx.json
          fail_on_unmatched_files: true

  # ── .vsix build (archive copy; full publish via vscode-release.yml) ────────
  build-vsix:
    # Builds .vsix for the PyPI release archive.
    # Full Marketplace + Open VSX publish is handled by vscode-release.yml.
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: epochix-vscode/webview-dist/
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      # vsce package's prepublish hook rebuilds the webview via vite in
      # ../frontend, so install the frontend's deps too.
      - run: npm --prefix frontend ci && npm --prefix epochix-vscode ci && cd epochix-vscode && npx vsce package --no-dependencies
      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: epochix-vscode/*.vsix
