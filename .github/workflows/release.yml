name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  build-wheel:
    needs: build-frontend
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
      - uses: astral-sh/setup-uv@v3
      - run: uv run python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: dist/

  publish:
    needs: build-wheel
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  # ── SBOM — generate a CycloneDX software-bill-of-materials from the wheel ──
  sbom:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write   # attach to release
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-ubuntu-latest
          merge-multiple: true
          path: dist/
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: dist/
          format: cyclonedx-json
          artifact-name: sbom-${{ github.ref_name }}.cyclonedx.json
          output-file: sbom.cyclonedx.json
      - name: Attach SBOM to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: sbom.cyclonedx.json
          fail_on_unmatched_files: true

  # ── Docker — build and push to GHCR ───────────────────────────────────────
  docker:
    needs: build-frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend bundle
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Extract version from tag
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          tags: |
            ghcr.io/model-story/server:${{ steps.meta.outputs.version }}
            ghcr.io/model-story/server:latest
          labels: |
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── .vsix build (archive copy; full publish via vscode-release.yml) ────────
  build-vsix:
    # Builds .vsix for the PyPI release archive.
    # Full Marketplace + Open VSX publish is handled by vscode-release.yml.
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: model-story-vscode/webview-dist/
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd model-story-vscode && npm ci && npx vsce package
      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: model-story-vscode/*.vsix
