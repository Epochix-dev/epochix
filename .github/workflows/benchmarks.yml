name: Benchmarks

on:
  pull_request:
    paths:
      - "src/model_story/parsers/**"
      - "src/model_story/store/**"
      - "src/model_story/normalizer/**"
      - "scripts/benchmark-parsers.py"
  workflow_dispatch:

jobs:
  parser-throughput:
    name: Parser throughput (≥ 50k lines/sec)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run parser benchmark
        run: python scripts/benchmark-parsers.py --lines 100000

      - name: Run store benchmark (pytest-benchmark)
        run: |
          pip install pytest-benchmark
          pytest tests/benchmarks/ -v --benchmark-min-rounds=3 \
            --benchmark-json=benchmark-results.json || true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: benchmark-results.json

  # Optional: compare against base branch (only on PRs)
  benchmark-compare:
    name: Compare benchmarks vs. base
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: parser-throughput

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download PR benchmark results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results
          path: pr-results/

      - name: Report
        run: |
          if [ -f pr-results/benchmark-results.json ]; then
            echo "Benchmark results available at pr-results/benchmark-results.json"
            python -c "
          import json, sys
          data = json.load(open('pr-results/benchmark-results.json'))
          benchmarks = data.get('benchmarks', [])
          print(f'Total benchmarks: {len(benchmarks)}')
          for b in benchmarks:
              mean_ms = b['stats']['mean'] * 1000
              print(f\"  {b['name']}: {mean_ms:.2f}ms mean\")
          "
          else
            echo "No benchmark results found."
          fi
