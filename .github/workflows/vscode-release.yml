name: VS Code Extension Release

# Triggered on every version tag.  The workflow:
#  1. Builds the Vite frontend bundle (the webview assets).
#  2. Bumps the extension version in package.json to match the tag.
#  3. Packages the .vsix with @vscode/vsce.
#  4. Publishes to the VS Code Marketplace (requires VSCE_PAT secret).
#  5. Publishes to the Open VSX Registry (requires OVSX_PAT secret).
#  6. Attaches the .vsix to the GitHub Release as a downloadable asset.
#
# Required repository secrets:
#   VSCE_PAT  — Azure DevOps Personal Access Token for VS Marketplace
#               (scope: Marketplace → Publish)
#   OVSX_PAT  — Open VSX Registry access token
#               (https://open-vsx.org → User Settings → Access Tokens)
#
# To test without publishing, create a tag prefixed with "test/":
#   git tag test/v0.1.0 && git push origin test/v0.1.0
# The publish steps are skipped for test/ tags.
#
# Secrets are optional. When VSCE_PAT / OVSX_PAT are absent the matching
# publish job is SKIPPED (not failed), so a tag can ship the .vsix as a GitHub
# Release asset before the Marketplace accounts exist. Once you add the
# secrets, re-run this workflow run (Actions → this run → Re-run all jobs) to
# publish the already-packaged version — no re-tag needed.

on:
  push:
    tags:
      - "v*"
      - "test/v*"
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  EXTENSION_DIR: epochix-vscode

jobs:
  # ── 0. Detect which publish secrets are configured ─────────────────────────
  gate:
    name: Check publish secrets
    runs-on: ubuntu-latest
    outputs:
      has_vsce: ${{ steps.check.outputs.has_vsce }}
      has_ovsx: ${{ steps.check.outputs.has_ovsx }}
    steps:
      - id: check
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          echo "has_vsce=$([ -n "$VSCE_PAT" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_ovsx=$([ -n "$OVSX_PAT" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

  # ── 1. Build the Vite frontend bundle ──────────────────────────────────────
  build-frontend:
    name: Build frontend bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build frontend
        run: cd frontend && npm ci && npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ── 2. Package the .vsix ───────────────────────────────────────────────────
  package-vsix:
    name: Package .vsix
    needs: build-frontend
    runs-on: ubuntu-latest
    outputs:
      vsix-path: ${{ steps.package.outputs.vsix-path }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - name: Download frontend bundle
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ${{ env.EXTENSION_DIR }}/webview-dist/

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.EXTENSION_DIR }}/package-lock.json

      # vsce package runs the `vscode:prepublish` hook, which rebuilds the
      # webview via vite in ../frontend — so the frontend's deps must be
      # installed too, not just the extension's.
      - name: Install dependencies (extension + frontend)
        run: |
          npm --prefix frontend ci
          npm --prefix ${{ env.EXTENSION_DIR }} ci

      # Strip the leading "v" (and optional "test/") from the tag to get the
      # semver string, e.g. refs/tags/v0.1.0 → 0.1.0
      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#test/}"   # strip optional test/ prefix
          VERSION="${VERSION#v}"   # strip leading v
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Packaging version ${VERSION}"

      - name: Bump package.json version
        run: |
          cd ${{ env.EXTENSION_DIR }}
          # --allow-same-version: the manifest may already be at the tag's
          # version (it's committed at release version), and plain `npm version`
          # errors out when the number is unchanged.
          npm version "${{ steps.version.outputs.version }}" --allow-same-version --no-git-tag-version

      - name: Run TypeScript type-check
        run: cd ${{ env.EXTENSION_DIR }} && npx tsc --noEmit

      - name: Package .vsix
        id: package
        run: |
          cd ${{ env.EXTENSION_DIR }}
          npx vsce package --no-dependencies
          VSIX=$(ls *.vsix | head -1)
          echo "vsix-path=${{ env.EXTENSION_DIR }}/${VSIX}" >> "$GITHUB_OUTPUT"
          echo "Packaged: ${VSIX}"

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ steps.version.outputs.version }}
          path: ${{ env.EXTENSION_DIR }}/*.vsix
          retention-days: 30

  # ── 3. Publish to VS Code Marketplace ─────────────────────────────────────
  publish-marketplace:
    name: Publish → VS Code Marketplace
    needs: [package-vsix, gate]
    runs-on: ubuntu-latest
    # Real release tags only, and only when the VSCE_PAT secret exists.
    if: ${{ !startsWith(github.ref_name, 'test/') && needs.gate.outputs.has_vsce == 'true' }}
    environment:
      name: vscode-marketplace
      url: https://marketplace.visualstudio.com/items?itemName=epochix.epochix
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vsix-${{ needs.package-vsix.outputs.version }}
          path: ./vsix/

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Publish to VS Code Marketplace
        # The Marketplace publish endpoint flakes with transient 5xx/timeouts
        # (0.5.12 and 0.5.21 both failed here on a good VSIX and succeeded on a
        # plain re-run). Retry before giving up. --skip-duplicate makes a retry
        # after a partial success a no-op instead of a hard "already exists"
        # failure. A real auth error (bad/expired PAT) still fails all attempts.
        run: |
          for attempt in 1 2 3; do
            if vsce publish --packagePath ./vsix/*.vsix --skip-duplicate; then
              echo "Published on attempt $attempt."
              exit 0
            fi
            echo "::warning::vsce publish attempt $attempt failed; retrying in 60s..."
            sleep 60
          done
          echo "::error::vsce publish failed after 3 attempts"
          exit 1
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  # ── 4. Publish to Open VSX Registry ───────────────────────────────────────
  publish-openvsx:
    name: Publish → Open VSX
    needs: [package-vsix, gate]
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.ref_name, 'test/') && needs.gate.outputs.has_ovsx == 'true' }}
    environment:
      name: open-vsx
      url: https://open-vsx.org/extension/epochix/epochix
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vsix-${{ needs.package-vsix.outputs.version }}
          path: ./vsix/

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install ovsx
        run: npm install -g ovsx

      # ovsx publish requires the namespace to already exist — it is NOT
      # auto-created. create-namespace is idempotent-friendly here: if it
      # already exists we ignore the error and go straight to publish.
      # (Both calls require the Eclipse publisher agreement to be signed for
      # this account, else Open VSX returns 403.)
      - name: Publish to Open VSX
        run: |
          ovsx create-namespace epochix --pat "$OVSX_PAT" || echo "namespace already exists (or creation skipped)"
          ovsx publish ./vsix/*.vsix --pat "$OVSX_PAT"
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

  # ── 5. Attach .vsix to the GitHub Release ─────────────────────────────────
  # Depends only on the packaged .vsix — the Marketplace/Open VSX publish jobs
  # may be skipped (no secrets) but the release asset should still be attached.
  attach-release-asset:
    name: Attach .vsix to GitHub Release
    needs: package-vsix
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.ref_name, 'test/') && github.event_name == 'push' }}
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vsix-${{ needs.package-vsix.outputs.version }}
          path: ./vsix/

      - name: Upload .vsix to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./vsix/*.vsix
          fail_on_unmatched_files: true
