name: Docs

# Build the MkDocs site on every push/PR that touches docs, and deploy to
# GitHub Pages on pushes to main. Point the docs.epochix.dev CNAME at
# <org>.github.io once DNS is set up; until then the site is served at
# https://epochix-dev.github.io/epochix/.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "src/epochix/**/*.py" # mkdocstrings renders API docs from source
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install docs toolchain
        run: pip install -e ".[docs]"

      - name: Build (strict — broken links/nav fail the job)
        run: mkdocs build --strict

      - uses: actions/upload-pages-artifact@v3
        if: github.event_name != 'pull_request'
        with:
          path: site/

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
