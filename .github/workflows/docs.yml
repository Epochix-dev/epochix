name: Docs

# Build the MkDocs site on every push/PR that touches docs, and deploy to
# GitHub Pages on pushes to main. Point the docs.epochix.dev CNAME at
# <org>.github.io once DNS is set up; until then the site is served at
# https://epochix-dev.github.io/epochix/.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "src/epochix/**/*.py" # mkdocstrings renders API docs from source
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      # hatchling force-includes frontend/dist into the wheel; the editable
      # install builds metadata through the same path, so the source dir must
      # exist even though the docs job never builds the real bundle.
      - name: Ensure frontend/dist exists (force-include source)
        run: mkdir -p frontend/dist

      - name: Install docs toolchain
        run: pip install -e ".[docs]"

      - name: Build (strict — broken links/nav fail the job)
        run: mkdocs build --strict

      - uses: actions/upload-pages-artifact@v3
        if: github.event_name != 'pull_request'
        with:
          path: site/

  deploy:
    # Deploy on push to main AND on manual "Run workflow" (workflow_dispatch),
    # so the site can be published on demand — e.g. the first deploy right
    # after enabling Pages, without waiting for a docs change.
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
