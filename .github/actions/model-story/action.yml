name: "Model Learning Story"
description: >
  Parse a training log and upload an HTML report as a workflow artifact.
  Optionally post a Markdown summary as a PR comment.

branding:
  icon: "bar-chart-2"
  color: "purple"

inputs:
  log-file:
    description: "Path to the training log file (relative to workspace root)."
    required: true
  task:
    description: >
      Force task type: auto, classification, detection, regression,
      biometric, gaze, nlp. Default: auto.
    required: false
    default: "auto"
  export:
    description: "Export formats (comma-separated): html,md,pdf. Default: html,md"
    required: false
    default: "html,md"
  artifact-name:
    description: "Name of the uploaded workflow artifact."
    required: false
    default: "model-story-report"
  comment-on-pr:
    description: "Post a Markdown summary as a PR comment (true/false)."
    required: false
    default: "true"
  python-version:
    description: "Python version to use."
    required: false
    default: "3.12"

outputs:
  run-id:
    description: "The model-story run ID."
    value: ${{ steps.parse.outputs.run-id }}
  grade:
    description: "Final letter grade (A+, A, B, …, F)."
    value: ${{ steps.parse.outputs.grade }}
  html-report:
    description: "Path to the exported HTML report."
    value: ${{ steps.export.outputs.html-path }}
  markdown-summary:
    description: "Path to the Markdown summary."
    value: ${{ steps.export.outputs.md-path }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install model-story
      shell: bash
      run: pip install "model-story" --quiet

    - name: Parse log file
      id: parse
      shell: bash
      run: |
        TASK_ARG=""
        if [ "${{ inputs.task }}" != "auto" ]; then
          TASK_ARG="--task ${{ inputs.task }}"
        fi

        OUTPUT=$(model-story batch "${{ inputs.log-file }}" $TASK_ARG \
          --json --headless 2>&1)

        RUN_ID=$(echo "$OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['id'])")
        GRADE=$(echo "$OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('final_grade','?'))")

        echo "run-id=$RUN_ID" >> "$GITHUB_OUTPUT"
        echo "grade=$GRADE" >> "$GITHUB_OUTPUT"
        echo "### Model Story" >> "$GITHUB_STEP_SUMMARY"
        echo "- **Run ID:** \`$RUN_ID\`" >> "$GITHUB_STEP_SUMMARY"
        echo "- **Grade:** $GRADE" >> "$GITHUB_STEP_SUMMARY"

    - name: Export reports
      id: export
      shell: bash
      run: |
        RUN_ID="${{ steps.parse.outputs.run-id }}"
        EXPORTS="${{ inputs.export }}"
        HTML_PATH=""
        MD_PATH=""

        if echo "$EXPORTS" | grep -q "html"; then
          model-story export "$RUN_ID" --format html --output report.html
          HTML_PATH="report.html"
        fi
        if echo "$EXPORTS" | grep -q "md"; then
          model-story export "$RUN_ID" --format md --output report.md
          MD_PATH="report.md"
        fi
        if echo "$EXPORTS" | grep -q "pdf"; then
          model-story export "$RUN_ID" --format pdf --output report.pdf || true
        fi

        echo "html-path=$HTML_PATH" >> "$GITHUB_OUTPUT"
        echo "md-path=$MD_PATH" >> "$GITHUB_OUTPUT"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: |
          report.html
          report.md
          report.pdf
        if-no-files-found: ignore

    - name: Comment on PR
      if: >
        inputs.comment-on-pr == 'true' &&
        github.event_name == 'pull_request' &&
        steps.export.outputs.md-path != ''
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const mdPath = '${{ steps.export.outputs.md-path }}';
          if (!fs.existsSync(mdPath)) { return; }

          const body = fs.readFileSync(mdPath, 'utf8');
          const header = `## 📊 Model Learning Story — Grade: ${{ steps.parse.outputs.grade }}\n\n`;

          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.payload.pull_request.number,
            body: header + body,
          });
