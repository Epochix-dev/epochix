site_name: Epochix
site_url: https://docs.epochix.dev
site_description: Visual storytelling for deep learning training runs.
site_author: epochix contributors
repo_url: https://github.com/epochix/epochix
repo_name: epochix/epochix
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - search.highlight
    - content.code.copy
    - content.tabs.link

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Parsers: parsers.md
  - Plugins: plugins.md
  - Deployment: deployment.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/epochix/epochix
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/epochix/

copyright: "Copyright &copy; 2024 epochix contributors — Apache-2.0 License"
