# Alembic configuration for model-story

[alembic]
script_location = src/model_story/store/migrations
prepend_sys_path = .

# Default DB URL — override with MODEL_STORY_DB env var or -x option
sqlalchemy.url = sqlite:///%(here)s/model_story.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
